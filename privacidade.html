<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Políticas de Privacidade - Momesso Digital</title>
  
  <!-- Carrega o Tailwind CSS diretamente -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Carrega o React e o ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Carrega o Babel para traduzir JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#121212]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Utilitário para renderizar Ícones SVG limpos sem dependências externas
    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
      ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-3 5.98-5.35.47-.55 1.17-.55 1.64 0C14.5 2.15 16.5 4 18.5 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
      Lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
      Database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>',
      Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
      Instagram: '<rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>',
      Linkedin: '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>',
      Menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
      X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
      Bot: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
      SendHorizontal: '<path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/>',
      Loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
      MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
    };

    const App = () => {
      const [scrolled, setScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([
        { role: 'assistant', text: 'Olá! Sou o consultor virtual da Momesso Digital. Como posso ajudar a impulsionar o seu negócio hoje?' }
      ]);
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (chatEndRef.current && isChatOpen) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, isTyping, isChatOpen]);

      const MAIN_SITE_URL = "index.html";
      const CONTACT_EMAIL = "contato@momessodigital.com.br";

      const handleChatSubmit = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isTyping) return;
        const userMessage = chatInput;
        setChatMessages(prev => [...prev, { role: 'user', text: userMessage }]);
        setChatInput('');
        setIsTyping(true);

        const systemPrompt = `Você é o consultor estratégico da Momesso Digital. Seu objetivo é sanar dúvidas de potenciais clientes sobre marketing digital e performance. Diretrizes de resposta: 1. Tom: Humanizado, parceiro, honesto e focado em resultados (ROI). 2. Contexto da Momesso: Focamos em Tráfego Pago, LPs de conversão, SEO, Social Media, Captação de Vídeos e Branding. 3. Diferencial: Tratamos o negócio do cliente como se fosse nosso. 4. Convite: Se a dúvida for complexa, sugira que falem com um especialista no formulário da página. 5. Mantenha as respostas diretas e profissionais.`;

        const apiKey = "AIzaSyBz_TNZN52qK1jEZYlmLgCWpcv9tpYXAcA";
        
        const callAI = async (retryCount = 0) => {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
              })
            });

            if (!response.ok) throw new Error('Falha na comunicação com o servidor de IA.');
            const data = await response.json();
            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!aiResponse) throw new Error('Resposta inválida.');
            return aiResponse;
          } catch (error) {
            if (retryCount < 5) {
              const delay = Math.pow(2, retryCount) * 1000;
              await new Promise(resolve => setTimeout(resolve, delay));
              return callAI(retryCount + 1);
            }
            throw error;
          }
        };

        try {
          const text = await callAI();
          setChatMessages(prev => [...prev, { role: 'assistant', text }]);
        } catch (err) {
          setChatMessages(prev => [...prev, { role: 'assistant', text: "Lamento, o sistema de análise estratégica está temporariamente instável. Por favor, utilize o formulário de contato." }]);
        } finally {
          setIsTyping(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#121212] text-[#EAEAEA] font-sans selection:bg-[#00F0FF] selection:text-[#121212] scroll-smooth">
          {/* Navbar Completa Integrada */}
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#121212]/95 backdrop-blur-md border-b border-[#EAEAEA]/5 py-3 shadow-lg' : 'bg-transparent py-5'}`}>
            <div className="container mx-auto px-6 flex justify-between items-center">
              <a href={MAIN_SITE_URL} className="flex items-center gap-2 group cursor-pointer outline-none">
                <div className="w-9 h-9 bg-[#00F0FF] rounded-lg flex items-center justify-center transition-transform group-hover:scale-105">
                  <span className="text-[#121212] font-black text-xl italic">M</span>
                </div>
                <span className="text-xl font-black tracking-tighter uppercase hidden sm:block">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
              </a>

              <div className="hidden lg:flex items-center gap-10">
                <a href="sobre.html" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors outline-none">Sobre Nós</a>
                <a href="index.html#proposito" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Propósito</a>
                <a href="index.html#servicos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Serviços</a>
                <a href="index.html#depoimentos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Clientes</a>
                <a href="index.html#contato" className="bg-[#00F0FF] text-[#121212] px-8 py-2.5 rounded-full text-xs font-black uppercase tracking-tighter hover:bg-white transition-all shadow-[0_0_15px_rgba(0,240,255,0.3)]">
                  Falar com Especialista
                </a>
              </div>

              <button className="lg:hidden text-[#EAEAEA]" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                <Icon path={isMenuOpen ? icons.X : icons.Menu} size={30} />
              </button>
            </div>

            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-[#121212] border-b border-[#212121] p-8 flex flex-col gap-6 shadow-xl">
                <a href="sobre.html" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-left outline-none text-[#EAEAEA]">Sobre Nós</a>
                <a href="index.html#proposito" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Propósito</a>
                <a href="index.html#servicos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Serviços</a>
                <a href="index.html#depoimentos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Clientes</a>
                <a href="index.html#contato" onClick={() => setIsMenuOpen(false)} className="bg-[#00F0FF] text-[#121212] p-4 rounded-xl text-center font-black">Começar Agora</a>
              </div>
            )}
          </nav>

          {/* Hero Section */}
          <section className="relative pt-40 pb-16 bg-[#1A1D24] border-b border-[#EAEAEA]/5">
            <div className="container mx-auto px-6 text-center max-w-4xl">
              <div className="w-16 h-16 bg-[#00F0FF]/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <Icon path={icons.ShieldCheck} size={32} className="text-[#00F0FF]" />
              </div>
              <h1 className="text-3xl md:text-5xl font-black mb-6 leading-tight tracking-tighter text-white uppercase">
                Políticas de Privacidade e Termos de Uso
              </h1>
              <p className="text-sm font-bold tracking-widest text-[#EAEAEA]/40 uppercase">Última atualização: Outubro de 2024</p>
            </div>
          </section>

          {/* Content Section */}
          <section className="py-20">
            <div className="container mx-auto px-6 max-w-3xl">
              <div className="prose prose-invert max-w-none text-[#EAEAEA]/70">
                
                <p className="text-lg mb-6 leading-relaxed">
                  A privacidade e segurança dos seus dados são prioridade para a Momesso Digital. Este documento descreve de forma clara e transparente como coletamos, utilizamos e protegemos as suas informações, em conformidade com a Lei Geral de Proteção de Dados (LGPD - Lei nº 13.709/2018).
                </p>

                <div className="mt-12 mb-6 flex items-center gap-3 border-b border-[#EAEAEA]/10 pb-4">
                  <Icon path={icons.Database} size={24} className="text-[#00F0FF]" />
                  <h2 className="text-2xl font-black text-white uppercase tracking-tight m-0">1. Coleta de Dados</h2>
                </div>
                <p className="mb-4 leading-relaxed">
                  Ao utilizar o nosso site e formulários de diagnóstico, coletamos os seguintes dados estritamente necessários para iniciarmos um contato comercial:
                </p>
                <ul className="list-disc pl-6 space-y-2 mb-6 leading-relaxed">
                  <li>Nome completo</li>
                  <li>Documento de Identificação (CPF/CNPJ)</li>
                  <li>Número de WhatsApp/Celular</li>
                  <li>Nome da Empresa</li>
                  <li>Links associados ao negócio (Instagram, Google Meu Negócio)</li>
                  <li>Interesses comerciais e dados de navegação (Cookies)</li>
                </ul>

                <div className="mt-12 mb-6 flex items-center gap-3 border-b border-[#EAEAEA]/10 pb-4">
                  <Icon path={icons.Lock} size={24} className="text-[#00F0FF]" />
                  <h2 className="text-2xl font-black text-white uppercase tracking-tight m-0">2. Utilização e Compartilhamento de Dados</h2>
                </div>
                <p className="mb-4 leading-relaxed">
                  Os dados coletados são utilizados única e exclusivamente para as seguintes finalidades:
                </p>
                <ul className="list-disc pl-6 space-y-2 mb-6 leading-relaxed">
                  <li>Realização de diagnóstico estratégico gratuito do seu negócio.</li>
                  <li>Contato comercial para apresentação de propostas via WhatsApp ou E-mail.</li>
                  <li>Elaboração de contratos de prestação de serviços.</li>
                  <li>Otimização da experiência de navegação no nosso site.</li>
                </ul>
                <p className="mb-6 leading-relaxed">
                  <strong className="text-white">A Momesso Digital não vende, aluga ou cede os seus dados a terceiros.</strong> As informações podem apenas ser processadas por ferramentas de infraestrutura parceiras (como sistemas de CRM, e-mail marketing ou automações), as quais também operam sob rigorosos padrões de segurança e privacidade.
                </p>

                <div className="mt-12 mb-6 flex items-center gap-3 border-b border-[#EAEAEA]/10 pb-4">
                  <Icon path={icons.ShieldCheck} size={24} className="text-[#00F0FF]" />
                  <h2 className="text-2xl font-black text-white uppercase tracking-tight m-0">3. Seus Direitos (LGPD)</h2>
                </div>
                <p className="mb-4 leading-relaxed">
                  Como titular dos dados, você tem o direito garantido por lei de, a qualquer momento:
                </p>
                <ul className="list-disc pl-6 space-y-2 mb-6 leading-relaxed">
                  <li>Confirmar a existência de tratamento dos seus dados.</li>
                  <li>Acessar, corrigir ou atualizar dados incompletos ou inexatos.</li>
                  <li>Solicitar a anonimização, bloqueio ou exclusão de dados desnecessários.</li>
                  <li>Revogar o consentimento para o tratamento futuro das suas informações.</li>
                </ul>

                <div className="mt-12 mb-6 flex items-center gap-3 border-b border-[#EAEAEA]/10 pb-4">
                  <Icon path={icons.Mail} size={24} className="text-[#00F0FF]" />
                  <h2 className="text-2xl font-black text-white uppercase tracking-tight m-0">4. Contato para Proteção de Dados</h2>
                </div>
                <p className="mb-6 leading-relaxed">
                  Se você tiver qualquer dúvida sobre esta Política de Privacidade ou desejar exercer os seus direitos relacionados aos seus dados pessoais, entre em contato conosco através do Encarregado de Proteção de Dados (DPO):
                </p>
                <div className="bg-[#1A1D24] p-6 rounded-xl border border-[#EAEAEA]/5 mt-6">
                  <p className="m-0 font-bold text-white">Momesso Digital</p>
                  <p className="m-0 text-[#00F0FF]">{CONTACT_EMAIL}</p>
                </div>

              </div>
            </div>
          </section>

          {/* Floating Chat */}
          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
            {isChatOpen && (
              <div className="mb-4 w-[350px] md:w-[400px] h-[550px] bg-[#1A1D24] border border-[#EAEAEA]/10 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
                <div className="bg-[#121212] p-5 flex items-center justify-between border-b border-[#EAEAEA]/5">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 bg-[#00F0FF] rounded-full flex items-center justify-center text-[#121212]"><Icon path={icons.Bot} size={20} /></div>
                    <div>
                      <h4 className="font-bold text-sm text-white">Consultor Virtual</h4>
                      <div className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-[#00F0FF] animate-pulse"></span>
                        <span className="text-[10px] uppercase font-bold text-[#EAEAEA]/40 tracking-widest">Online</span>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} className="text-[#EAEAEA]/40 hover:text-white"><Icon path={icons.X} size={20} /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-5 space-y-5 scrollbar-hide bg-[#121212]">
                  {chatMessages.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-4 text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-[#00F0FF] text-[#121212] font-medium rounded-2xl rounded-tr-sm' : 'bg-[#1A1D24] text-[#EAEAEA]/90 border border-[#EAEAEA]/5 rounded-2xl rounded-tl-sm'}`}>
                        {msg.text}
                      </div>
                    </div>
                  ))}
                  {isTyping && (
                    <div className="flex justify-start">
                      <div className="bg-[#1A1D24] p-4 rounded-2xl rounded-tl-sm border border-[#EAEAEA]/5 flex gap-2 items-center">
                        <Icon path={icons.Loader2} size={16} className="animate-spin text-[#00F0FF]" />
                        <span className="text-[10px] uppercase font-bold text-[#EAEAEA]/40 tracking-widest">Analisando...</span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleChatSubmit} className="p-4 bg-[#1A1D24] border-t border-[#EAEAEA]/5">
                  <div className="relative">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Escreva a sua mensagem..." className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] rounded-xl pl-4 pr-12 py-3.5 text-sm outline-none text-white" />
                    <button type="submit" disabled={isTyping || !chatInput.trim()} className="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-[#00F0FF] text-[#121212] rounded-lg flex items-center justify-center disabled:opacity-30 hover:scale-105 transition-transform">
                      <Icon path={icons.SendHorizontal} size={18} />
                    </button>
                  </div>
                </form>
              </div>
            )}
            <button onClick={() => setIsChatOpen(!isChatOpen)} className={`w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 ${isChatOpen ? 'bg-[#1A1D24] text-[#00F0FF] border border-[#EAEAEA]/10' : 'bg-[#00F0FF] text-[#121212]'}`}>
              <Icon path={isChatOpen ? icons.X : icons.MessageSquare} size={24} />
            </button>
          </div>

          {/* Footer Completo e Funcional (Replicado da Home) */}
          <footer className="bg-[#1A1D24] border-t border-[#EAEAEA]/5 pt-20 pb-10 mt-10">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                
                {/* Brand & Descrição */}
                <div className="space-y-6">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-[#00F0FF] rounded-lg flex items-center justify-center">
                      <span className="text-[#121212] font-black text-lg italic">M</span>
                    </div>
                    <span className="text-lg font-black tracking-tighter uppercase text-white">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
                  </div>
                  <p className="text-[#EAEAEA]/60 text-sm leading-relaxed">
                    Estratégia digital com propósito e performance. Transformamos cliques em clientes e investimento em lucro estruturado para o seu negócio.
                  </p>
                </div>

                {/* Navegação Rápida */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Navegação</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="index.html" className="hover:text-[#00F0FF] transition-colors">Página Inicial</a></li>
                    <li><a href="sobre.html" className="hover:text-[#00F0FF] transition-colors">Sobre Nós</a></li>
                    <li><a href="index.html#servicos" className="hover:text-[#00F0FF] transition-colors">Serviços e Soluções</a></li>
                    <li><a href="index.html#depoimentos" className="hover:text-[#00F0FF] transition-colors">Casos de Sucesso</a></li>
                  </ul>
                </div>

                {/* Legal e Contacto */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Legal & Contactos</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="privacidade.html" className="text-white transition-colors cursor-default">Políticas de Privacidade</a></li>
                    <li className="pt-4 flex items-center gap-3">
                      <Icon path={icons.Mail} size={16} className="text-[#00F0FF]" /> 
                      <a href="mailto:contato@momessodigital.com.br" className="hover:text-white transition-colors">contato@momessodigital.com.br</a>
                    </li>
                  </ul>
                </div>

                {/* Redes Sociais */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Redes Sociais</h4>
                  <div className="flex gap-4">
                     <a href="#" aria-label="Instagram" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Instagram} size={18} />
                     </a>
                     <a href="#" aria-label="LinkedIn" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Linkedin} size={18} />
                     </a>
                  </div>
                </div>
              </div>

              {/* Copyright Bar */}
              <div className="border-t border-[#EAEAEA]/5 pt-8 flex flex-col md:flex-row items-center justify-between gap-4 text-center md:text-left">
                <p className="text-[10px] font-bold text-[#EAEAEA]/40 tracking-[0.2em] uppercase">
                  &copy; {new Date().getFullYear()} Momesso Digital. Todos os direitos reservados.
                </p>
                <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/30">
                  Growth & Performance
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
