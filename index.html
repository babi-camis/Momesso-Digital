    const icons = {

      Rocket: '<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',

      Award: '<circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>',

      Sparkles: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>',
      Search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
      Layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>',
      Bot: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
      SendHorizontal: '<path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/>',
      Loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
      MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',

      Globe: '<circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>',
      Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>'
    };

    const App = () => {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [formSubmitted, setFormSubmitted] = useState(false);
      
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([
        { role: 'assistant', text: 'Olá! Sou o consultor virtual da Momesso Digital. Como posso ajudar a impulsionar o seu negócio hoje?' }
      ]);
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      const testimonials = [
        { id: 1, name: "Ana Silva", role: "CEO da TechFlow", content: "A Momesso não é uma agência comum. Eles sentaram com a gente, entenderam as nossas dores e trataram o nosso negócio como se fosse deles.", image: "AS" },
        { id: 2, name: "Ricardo Mendes", role: "Fundador da Aura E-commerce", content: "A transparência foi o diferencial. Sabíamos exatamente para onde o investimento ia e o retorno veio em 3 meses.", image: "RM" },
        { id: 3, name: "Carla Ferreira", role: "Diretora de Marketing Grupo Prime", content: "Finalmente encontramos parceiros que se importam com os nossos lucros tanto quanto nós. Confiança total.", image: "CF" }
      ];

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (chatEndRef.current && isChatOpen) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, isTyping, isChatOpen]);

      const services = [
        { title: "Tráfego Pago", description: "Gestão agressiva de campanhas no Google, Meta e TikTok Ads focada exclusivamente em ROI e escala.", icon: <Icon path={icons.Target} className="w-8 h-8 text-[#00F0FF]" />, features: ["Google Ads", "Meta Ads", "TikTok Ads", "Retargeting"] },
        { title: "Desenvolvimento Web", description: "Criação de Landing Pages, Sites Institucionais e E-commerces otimizados para alta conversão e velocidade.", icon: <Icon path={icons.Monitor} className="w-8 h-8 text-[#00F0FF]" />, features: ["Landing Pages", "E-commerce", "Institucionais", "Otimização UX/UI"] },
        { title: "Branding e Rebranding", description: "Construção de identidades visuais memoráveis e reformulação de marcas que precisam de um posicionamento premium.", icon: <Icon path={icons.Sparkles} className="w-8 h-8 text-[#00F0FF]" />, features: ["Identidade Visual", "Naming", "Manual da Marca", "Design System"] },
        { title: "Posicionamento de Marca", description: "Estratégia de comunicação e percepção de valor para tornar a sua empresa a autoridade máxima do seu nicho.", icon: <Icon path={icons.TrendingUp} className="w-8 h-8 text-[#00F0FF]" />, features: ["Tom de Voz", "Estratégia de Conteúdo", "Diferenciação", "Arquétipos"] },
        { title: "SEO", description: "Colocamos o seu negócio no topo das pesquisas do Google de forma orgânica, gerando tráfego qualificado gratuito.", icon: <Icon path={icons.Search} className="w-8 h-8 text-[#00F0FF]" />, features: ["SEO On-page", "SEO Local (GMN)", "Link Building", "Auditoria Técnica"] },
        { title: "Social Media", description: "Transformamos as suas redes sociais num canal ativo de vendas, comunidade e construção de autoridade.", icon: <Icon path={icons.Layers} className="w-8 h-8 text-[#00F0FF]" />, features: ["Gestão de Conteúdo", "Copywriting", "Design de Posts", "Análise de Métricas"] },
        { title: "Captação e Edição de Vídeo", description: "Produção audiovisual estratégica desenhada para reter a atenção e escalar a conversão dos seus anúncios e conteúdos.", icon: <Icon path={icons.Video} className="w-8 h-8 text-[#00F0FF]" />, features: ["Criativos para Ads", "Vídeos Institucionais", "Reels e Shorts", "Edição Dinâmica"] }
      ];

      const cases = [
        { company: "Indústria Global Tech", metric: "ROI 15.8x", description: "Reestruturação de funil B2B com foco em leads qualificados.", sub: "Crescimento sustentável e previsível." },
        { company: "E-commerce Premium", metric: "+410% Escala", description: "Escalabilidade mantendo a essência da marca e rentabilidade.", sub: "Aumento real de faturamento." }
      ];

      const partners = [
        { name: "Google Partner", icon: <Icon path={icons.Award} size={16} /> },
        { name: "Meta Partner", icon: <Icon path={icons.ShieldCheck} size={16} /> },
        { name: "RD Station", icon: <Icon path={icons.Zap} size={16} /> },
        { name: "Shopify Experts", icon: <Icon path={icons.ArrowUpRight} size={16} /> }
      ];

      const handleFormSubmit = (e) => {
        e.preventDefault();
        setFormSubmitted(true);
        setTimeout(() => setFormSubmitted(false), 5000);
        e.target.reset();
      };

      const handleChatSubmit = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isTyping) return;
        const userMessage = chatInput;
        setChatMessages(prev => [...prev, { role: 'user', text: userMessage }]);
        setChatInput('');
        setIsTyping(true);

        const systemPrompt = `Você é o consultor estratégico da Momesso Digital. Seu objetivo é sanar dúvidas de potenciais clientes sobre marketing digital e performance. Diretrizes de resposta: 1. Tom: Humanizado, parceiro, honesto e focado em resultados (ROI). 2. Contexto da Momesso: Focamos em Tráfego Pago, LPs de conversão, SEO, Social Media, Captação de Vídeos e Branding. 3. Diferencial: Tratamos o negócio do cliente como se fosse nosso. 4. Convite: Se a dúvida for complexa, sugira que falem com um especialista no formulário da página. 5. Mantenha as respostas diretas e profissionais.`;

        const apiKey = "AIzaSyBz_TNZN52qK1jEZYlmLgCWpcv9tpYXAcA";
        
        // Alterado para o modelo estável global gemini-1.5-flash
        const callAI = async (retryCount = 0) => {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
              })
            });

            if (!response.ok) throw new Error('Falha na comunicação com o servidor de IA.');
            const data = await response.json();
            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!aiResponse) throw new Error('Resposta inválida.');
            return aiResponse;
          } catch (error) {
            if (retryCount < 5) {
              const delay = Math.pow(2, retryCount) * 1000;
              await new Promise(resolve => setTimeout(resolve, delay));
              return callAI(retryCount + 1);
            }
            throw error;
          }
        };

        try {
          const text = await callAI();
          setChatMessages(prev => [...prev, { role: 'assistant', text }]);
        } catch (err) {
          setChatMessages(prev => [...prev, { role: 'assistant', text: "Lamento, o sistema de análise estratégica está temporariamente instável. Por favor, utilize o formulário de contato abaixo." }]);
        } finally {
          setIsTyping(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#121212] text-[#EAEAEA] font-sans selection:bg-[#00F0FF] selection:text-[#121212] scroll-smooth">
          {/* Navbar */}

                </div>

              </div>

              <div className="hidden lg:flex items-center gap-10">

                <a href="#proposito" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Propósito</a>
                <a href="#servicos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Serviços</a>
                <a href="#depoimentos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Clientes</a>
                <a href="#contato" className="bg-[#00F0FF] text-[#121212] px-8 py-2.5 rounded-full text-xs font-black uppercase tracking-tighter hover:bg-white transition-all shadow-[0_0_15px_rgba(0,240,255,0.3)]">
                  Falar com Especialista
                </a>
              </div>

              <button className="lg:hidden text-[#EAEAEA]" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                <Icon path={isMenuOpen ? icons.X : icons.Menu} size={30} />
              </button>
            </div>

            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-[#121212] border-b border-[#212121] p-8 flex flex-col gap-6 shadow-xl">
                <a href="sobre.html" className="text-lg font-bold text-left outline-none text-[#EAEAEA]">Sobre Nós</a>
                <a href="#proposito" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Propósito</a>
                <a href="#servicos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Serviços</a>
                <a href="#depoimentos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Clientes</a>
                <a href="#contato" onClick={() => setIsMenuOpen(false)} className="bg-[#00F0FF] text-[#121212] p-4 rounded-xl text-center font-black">Começar Agora</a>
              </div>
            )}
          </nav>

          {/* Hero Section */}
          <section className="relative pt-48 pb-32 overflow-hidden">
            <div className="absolute top-40 left-0 w-[400px] h-[400px] bg-[#00F0FF]/10 blur-[120px] rounded-full -ml-32"></div>

            <div className="container mx-auto px-6 relative z-10 text-center md:text-left">
              <div className="max-w-4xl">
                <div className="flex items-center justify-center md:justify-start gap-3 mb-6">
                  <span className="text-[#EAEAEA]/50 text-xs font-black uppercase tracking-[0.3em] flex items-center gap-2 bg-[#212121] px-4 py-1.5 rounded-full border border-[#EAEAEA]/5">
                    <Icon path={icons.Heart} size={14} className="text-[#00F0FF]" /> Parceria & Resultados
                  </span>
                </div>
                <h1 className="text-5xl md:text-8xl font-black mb-8 leading-[1.1] tracking-tighter text-white">
                  Estratégia digital <br />
                  com <span className="text-[#00F0FF] italic underline decoration-[#00F0FF]/30">propósito e estratégia.</span>
                </h1>
                <p className="text-lg md:text-xl text-[#EAEAEA]/70 mb-12 max-w-2xl leading-relaxed">
                  Não somos apenas uma agência. Somos o alavancador do seu negócio no digital, focados em transformar cliques em clientes e investimento em lucro.
                </p>
                <div className="flex flex-col sm:flex-row gap-6 justify-center md:justify-start">
                  <a href="#contato" className="bg-[#00F0FF] text-[#121212] px-12 py-5 rounded-full font-black text-lg flex items-center justify-center gap-3 hover:scale-105 transition-transform shadow-[0_0_30px_rgba(0,240,255,0.2)]">
                    QUERO CRESCER AGORA <Icon path={icons.ChevronRight} size={24} />
                  </a>
                  <div className="flex items-center gap-4 px-6 md:border-l border-[#EAEAEA]/10">
                    <div className="text-3xl font-black text-white">100%</div>
                    <div className="text-[10px] font-bold uppercase text-[#EAEAEA]/40 leading-none text-left">Foco em <br />Escalabilidade</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Partners Bar */}
          <div className="bg-[#1A1D24] py-8 border-y border-[#EAEAEA]/5">
            <div className="container mx-auto px-6">
              <div className="flex flex-wrap justify-center md:justify-between items-center gap-8 opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
                {partners.map((p, i) => (
                  <div key={i} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest whitespace-nowrap text-[#EAEAEA]">
                    <span className="text-[#00F0FF]">{p.icon}</span> {p.name}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Services */}
          <section id="servicos" className="py-32 bg-[#121212] relative">
            <div className="container mx-auto px-6 relative z-10">
              <div className="max-w-3xl mb-20">
                <span className="text-[#00F0FF] text-xs font-black uppercase tracking-[0.3em] block mb-4">Soluções de Impacto</span>
                <h2 className="text-4xl md:text-5xl font-black leading-tight text-white">
                  O que fazemos para o seu <br />
                  negócio <span className="text-[#00F0FF]">escalar.</span>
                </h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {services.map((service, index) => (
                  <div key={index} className="bg-[#1A1D24] p-10 rounded-[2rem] border border-[#EAEAEA]/5 hover:border-[#00F0FF]/30 transition-all group hover:-translate-y-1 shadow-lg flex flex-col">
                    <div className="mb-8 inline-block p-4 bg-[#121212] rounded-2xl group-hover:bg-[#00F0FF]/10 transition-colors shadow-inner self-start">
                      {service.icon}
                    </div>
                    <h3 className="text-xl font-bold mb-4 text-white group-hover:text-[#00F0FF] transition-colors">{service.title}</h3>
                    <p className="text-[#EAEAEA]/60 text-sm leading-relaxed mb-8 flex-1">{service.description}</p>
                    <ul className="space-y-3">
                      {service.features.map((feature, fIndex) => (
                        <li key={fIndex} className="flex items-center gap-3 text-xs font-bold text-[#EAEAEA]/70">
                          <Icon path={icons.Check} size={14} className="text-[#00F0FF]" /> {feature}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Purpose */}
          <section id="proposito" className="py-32 bg-[#1A1D24] border-y border-[#EAEAEA]/5 relative">
            <div className="container mx-auto px-6 relative z-10">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                <div className="order-2 lg:order-1">
                  <div className="bg-[#121212] p-10 rounded-[2rem] border border-[#EAEAEA]/5 relative shadow-2xl">
                    <Icon path={icons.Sparkles} className="absolute -top-6 -left-6 text-[#00F0FF] opacity-30" size={60} />
                    <h3 className="text-2xl font-black mb-6 italic text-white">Parceria acima de tudo</h3>
                    <p className="text-[#EAEAEA]/60 mb-8 leading-relaxed">
                      Não somos uma fábrica de anúncios. Somos consultores estratégicos que se importam com a sua marca. Trabalhamos lado a lado para garantir que cada movimento no digital gere valor sustentável.
                    </p>
                    <div className="grid grid-cols-2 gap-6">
                      <div className="p-6 bg-[#1A1D24] rounded-xl border border-[#EAEAEA]/5 text-center flex flex-col items-center justify-center">
                        <div className="text-white font-black text-3xl mb-1">+50</div>
                        <div className="text-[10px] text-[#EAEAEA]/40 uppercase font-bold tracking-widest">Negócios</div>
                      </div>
                      <div className="p-6 bg-[#1A1D24] rounded-xl border border-[#EAEAEA]/5 text-center flex flex-col items-center justify-center">
                        <div className="text-[#00F0FF] font-black text-3xl mb-1">98%</div>
                        <div className="text-[10px] text-[#EAEAEA]/40 uppercase font-bold tracking-widest">Retenção</div>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="order-1 lg:order-2">
                  <h2 className="text-4xl md:text-5xl font-black mb-10 leading-tight text-white">
                    UM MÉTODO QUE <br />
                    PRIORIZA A <span className="text-[#00F0FF]">SINERGIA.</span>
                  </h2>
                  <div className="space-y-8">
                    {[
                      { t: "Escuta Ativa", d: "Antes de sugerir, entendemos. O seu mercado tem particularidades que respeitamos.", i: <Icon path={icons.Coffee} size={20} /> },
                      { t: "Estratégia Humana", d: "Por trás de cada clique existe uma pessoa. Humanizamos a venda para criar valor.", i: <Icon path={icons.Users} size={20} /> },
                      { t: "Transparência", d: "Sem termos técnicos complicados. Resultados claros e conversas honestas.", i: <Icon path={icons.ShieldCheck} size={20} /> }
                    ].map((item, i) => (
                      <div key={i} className="flex gap-6 group">
                        <div className="flex-shrink-0 w-12 h-12 bg-[#212121] rounded-full flex items-center justify-center text-[#EAEAEA]/50 group-hover:bg-[#00F0FF] group-hover:text-[#121212] transition-all">
                          {item.i}
                        </div>
                        <div>
                          <h4 className="text-lg font-bold mb-1 text-white">{item.t}</h4>
                          <p className="text-[#EAEAEA]/50 text-sm leading-relaxed">{item.d}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ROI */}
          <section className="py-32 bg-[#121212]">
            <div className="container mx-auto px-6">
              <div className="max-w-2xl mb-16">
                <h2 className="text-4xl font-black mb-4 uppercase text-white">Impacto <span className="text-[#00F0FF]">Mensurável</span></h2>
                <p className="text-lg text-[#EAEAEA]/60">A humanização é a nossa base, mas o ROI é o nosso comprovativo de competência.</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {cases.map((c, i) => (
                  <div key={i} className="bg-[#1A1D24] p-12 border border-[#EAEAEA]/5 rounded-[2rem] hover:border-[#00F0FF]/30 transition-colors shadow-lg relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-8 opacity-5"><Icon path={icons.TrendingUp} size={100} /></div>
                    <h4 className="text-xs font-black uppercase tracking-[0.3em] text-[#00F0FF] mb-6">{c.company}</h4>
                    <div className="text-6xl font-black text-white mb-6 tracking-tighter">{c.metric}</div>
                    <p className="text-[#EAEAEA]/70 font-medium mb-6 leading-relaxed max-w-sm">{c.description}</p>
                    <div className="flex items-center gap-2 text-xs text-[#00F0FF] font-black uppercase tracking-widest bg-[#00F0FF]/10 inline-flex px-4 py-2 rounded-full">
                      <Icon path={icons.CheckCircle} size={14} /> {c.sub}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Testimonials */}
          <section id="depoimentos" className="py-32 bg-[#1A1D24] border-y border-[#EAEAEA]/5">
            <div className="container mx-auto px-6 text-center">
              <h2 className="text-4xl font-black mb-4 tracking-tight text-white">Vozes que confiam em nós</h2>
              <p className="text-[#EAEAEA]/50 mb-16">Histórias reais de quem escalou com a Momesso Digital.</p>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                {testimonials.map((t) => (
                  <div key={t.id} className="bg-[#121212] p-10 rounded-[2rem] border border-[#EAEAEA]/5 relative group text-left shadow-xl flex flex-col justify-between">
                    <div>
                      <Icon path={icons.Quote} className="text-[#00F0FF]/20 absolute top-8 right-8" size={40} />
                      <p className="text-[#EAEAEA]/80 italic mb-10 relative z-10 leading-relaxed">"{t.content}"</p>
                    </div>
                    <div className="flex items-center gap-4 pt-6 border-t border-[#EAEAEA]/5">
                      <div className="w-12 h-12 bg-[#212121] rounded-full flex items-center justify-center font-black text-white">
                        {t.image}
                      </div>
                      <div>
                        <h5 className="font-bold text-white">{t.name}</h5>
                        <p className="text-[10px] text-[#00F0FF] uppercase tracking-widest font-bold">{t.role}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Form */}
          <section id="contato" className="py-32 relative bg-[#121212]">
            <div className="container mx-auto px-6 relative z-10">
              <div className="max-w-6xl mx-auto flex flex-col lg:flex-row bg-[#1A1D24] rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-[#EAEAEA]/5">
                <div className="lg:w-2/5 p-12 md:p-16 flex flex-col justify-between border-r border-[#EAEAEA]/5 bg-[#1A1D24]">
                  <div>
                    <h2 className="text-4xl font-black mb-6 leading-tight uppercase tracking-tighter text-white">O SEU <br />CRESCIMENTO <br />COMEÇA AQUI.</h2>
                    <p className="text-[#EAEAEA]/60 mb-10 leading-relaxed text-sm">
                      Para podermos dedicar o tempo e o cuidado que o seu negócio merece, conte-nos um pouco sobre os seus objetivos.
                    </p>
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 text-[#EAEAEA]/70 text-sm font-medium">
                        <Icon path={icons.CheckCircle} size={18} className="text-[#00F0FF]" /> Análise Personalizada
                      </div>
                      <div className="flex items-center gap-3 text-[#EAEAEA]/70 text-sm font-medium">
                        <Icon path={icons.CheckCircle} size={18} className="text-[#00F0FF]" /> Contato Rápido
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:w-3/5 p-8 md:p-16">
                  {!formSubmitted ? (
                    <form onSubmit={handleFormSubmit} className="space-y-8">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="relative">
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/40 mb-2 block">Nome Completo</label>
                          <input required name="name" type="text" className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] px-4 py-3 rounded-xl outline-none transition-all text-white" />
                        </div>
                        <div className="relative">
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/40 mb-2 block">Documento (CPF/CNPJ)</label>
                          <input required name="document" type="text" className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] px-4 py-3 rounded-xl outline-none transition-all text-white" />
                        </div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="relative">
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/40 mb-2 block">WhatsApp</label>
                          <input required name="whatsapp" type="tel" className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] px-4 py-3 rounded-xl outline-none transition-all text-white" placeholder="(11) 90000-0000" />
                        </div>
                        <div className="relative">
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/40 mb-2 block">Empresa</label>
                          <input required name="company" type="text" className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] px-4 py-3 rounded-xl outline-none transition-all text-white" />
                        </div>
                        <div className="relative md:col-span-2">
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/40 mb-2 block">Serviço de Interesse</label>
                          <select required name="interest" defaultValue="" className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] px-4 py-3 rounded-xl outline-none transition-all text-white appearance-none">
                            <option value="" disabled>Selecione o serviço principal...</option>
                            <option value="Tráfego Pago">Tráfego Pago</option>
                            <option value="Desenvolvimento Web">Desenvolvimento Web</option>
                            <option value="Branding e Rebranding">Branding e Rebranding</option>
                            <option value="Posicionamento de Marca">Posicionamento de Marca</option>
                            <option value="SEO">SEO</option>
                            <option value="Social Media">Social Media</option>
                            <option value="Captação de Vídeos e Edição">Captação de Vídeos e Edição</option>
                            <option value="Diagnóstico Completo">Múltiplos Serviços / Diagnóstico Completo</option>
                          </select>
                        </div>
                      </div>
                      <button type="submit" className="w-full bg-[#00F0FF] text-[#121212] py-5 rounded-xl font-black text-lg shadow-[0_0_20px_rgba(0,240,255,0.2)] flex items-center justify-center gap-4 uppercase tracking-tighter hover:bg-white transition-all mt-4">
                        SOLICITAR DIAGNÓSTICO <Icon path={icons.Send} size={20} />
                      </button>
                    </form>
                  ) : (
                    <div className="h-full flex flex-col items-center justify-center py-20 text-center">
                      <div className="w-20 h-20 bg-[#00F0FF]/10 rounded-full flex items-center justify-center mb-6">
                        <Icon path={icons.CheckCircle} size={40} className="text-[#00F0FF]" />
                      </div>
                      <h3 className="text-3xl font-black mb-4 uppercase text-white">Dados Recebidos!</h3>
                      <p className="text-[#EAEAEA]/60 font-medium">Um consultor da Momesso entrará em contato muito em breve.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* Floating Chat */}
          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
            {isChatOpen && (
              <div className="mb-4 w-[350px] md:w-[400px] h-[550px] bg-[#1A1D24] border border-[#EAEAEA]/10 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
                <div className="bg-[#121212] p-5 flex items-center justify-between border-b border-[#EAEAEA]/5">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 bg-[#00F0FF] rounded-full flex items-center justify-center text-[#121212]"><Icon path={icons.Bot} size={20} /></div>
                    <div>
                      <h4 className="font-bold text-sm text-white">Consultor Virtual</h4>
                      <div className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-[#00F0FF] animate-pulse"></span>
                        <span className="text-[10px] uppercase font-bold text-[#EAEAEA]/40 tracking-widest">Online</span>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} className="text-[#EAEAEA]/40 hover:text-white"><Icon path={icons.X} size={20} /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-5 space-y-5 scrollbar-hide bg-[#121212]">
                  {chatMessages.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-4 text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-[#00F0FF] text-[#121212] font-medium rounded-2xl rounded-tr-sm' : 'bg-[#1A1D24] text-[#EAEAEA]/90 border border-[#EAEAEA]/5 rounded-2xl rounded-tl-sm'}`}>
                        {msg.text}
                      </div>
                    </div>
                  ))}
                  {isTyping && (
                    <div className="flex justify-start">
                      <div className="bg-[#1A1D24] p-4 rounded-2xl rounded-tl-sm border border-[#EAEAEA]/5 flex gap-2 items-center">
                        <Icon path={icons.Loader2} size={16} className="animate-spin text-[#00F0FF]" />
                        <span className="text-[10px] uppercase font-bold text-[#EAEAEA]/40 tracking-widest">Analisando...</span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleChatSubmit} className="p-4 bg-[#1A1D24] border-t border-[#EAEAEA]/5">
                  <div className="relative">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Escreva a sua mensagem..." className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] rounded-xl pl-4 pr-12 py-3.5 text-sm outline-none text-white" />
                    <button type="submit" disabled={isTyping || !chatInput.trim()} className="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-[#00F0FF] text-[#121212] rounded-lg flex items-center justify-center disabled:opacity-30 hover:scale-105 transition-transform">
                      <Icon path={icons.SendHorizontal} size={18} />
                    </button>
                  </div>
                </form>
              </div>
            )}
            <button onClick={() => setIsChatOpen(!isChatOpen)} className={`w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 ${isChatOpen ? 'bg-[#1A1D24] text-[#00F0FF] border border-[#EAEAEA]/10' : 'bg-[#00F0FF] text-[#121212]'}`}>
              <Icon path={isChatOpen ? icons.X : icons.MessageSquare} size={24} />
            </button>
          </div>

          {/* Footer Completo e Funcional */}
          <footer className="bg-[#1A1D24] border-t border-[#EAEAEA]/5 pt-20 pb-10 mt-10">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                
                {/* Brand & Descrição */}
                <div className="space-y-6">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-[#00F0FF] rounded-lg flex items-center justify-center">
                      <span className="text-[#121212] font-black text-lg italic">M</span>
                    </div>
                    <span className="text-lg font-black tracking-tighter uppercase text-white">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
                  </div>
                  <p className="text-[#EAEAEA]/60 text-sm leading-relaxed">
                    Estratégia digital com propósito e performance. Transformamos cliques em clientes e investimento em lucro estruturado para o seu negócio.
                  </p>
                </div>

                {/* Navegação Rápida */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Navegação</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="#" className="hover:text-[#00F0FF] transition-colors">Página Inicial</a></li>
                    <li><a href="sobre.html" className="hover:text-[#00F0FF] transition-colors">Sobre Nós</a></li>
                    <li><a href="#servicos" className="hover:text-[#00F0FF] transition-colors">Serviços e Soluções</a></li>
                    <li><a href="#depoimentos" className="hover:text-[#00F0FF] transition-colors">Casos de Sucesso</a></li>
                  </ul>
                </div>

                {/* Legal e Contacto */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Legal & Contactos</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="privacidade.html" className="hover:text-[#00F0FF] transition-colors">Políticas de Privacidade</a></li>
                    <li className="pt-4 flex items-center gap-3">
                      <Icon path={icons.Mail} size={16} className="text-[#00F0FF]" /> 
                      <a href="mailto:contato@momessodigital.com.br" className="hover:text-white transition-colors">contato@momessodigital.com.br</a>
                    </li>
                  </ul>
                </div>

                {/* Redes Sociais */}
                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Redes Sociais</h4>
                  <div className="flex gap-4">
                     <a href="#" aria-label="Instagram" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Instagram} size={18} />
                     </a>
                     <a href="#" aria-label="LinkedIn" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Linkedin} size={18} />
                     </a>
                  </div>
                </div>
              </div>

              {/* Copyright Bar */}
              <div className="border-t border-[#EAEAEA]/5 pt-8 flex flex-col md:flex-row items-center justify-between gap-4 text-center md:text-left">
                <p className="text-[10px] font-bold text-[#EAEAEA]/40 tracking-[0.2em] uppercase">
                  &copy; {new Date().getFullYear()} Momesso Digital. Todos os direitos reservados.
                </p>
                <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/30">
                  Growth & Performance
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
