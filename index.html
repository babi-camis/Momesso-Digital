<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momesso Digital - Estratégia e Performance</title>
  
  <!-- Estilos e Dependências -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #121212; color: #EAEAEA; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fade-in 0.3s ease-out forwards; }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      Monitor: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>',
      Rocket: '<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
      Target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
      ChevronRight: '<path d="m9 18 6-6-6-6"/>',
      Instagram: '<rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>',
      Linkedin: '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>',
      CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
      Menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
      X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
      TrendingUp: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
      Heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
      Sparkles: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>',
      Search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
      Layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>',
      Bot: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
      SendHorizontal: '<path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/>',
      MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
      Quote: '<path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>',
      Loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
      Video: '<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>',
      Award: '<circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>',
      ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-3 5.98-5.35.47-.55 1.17-.55 1.64 0C14.5 2.15 16.5 4 18.5 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
      Zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
      ArrowUpRight: '<line x1="7" x2="17" y1="17" y2="7"/><polyline points="7 7 17 7 17 17"/>',
      Coffee: '<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>',
      Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
      Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>'
    };

    const App = () => {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [formSubmitted, setFormSubmitted] = useState(false);
      
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([
        { role: 'assistant', text: 'Olá! Sou o consultor virtual da Momesso Digital. Como posso ajudar a impulsionar o seu negócio hoje?' }
      ]);
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      const testimonials = [
        { id: 1, name: "Ana Silva", role: "CEO da TechFlow", content: "A Momesso não é uma agência comum. Eles sentaram com a gente, entenderam as nossas dores e trataram o nosso negócio como se fosse deles.", image: "AS" },
        { id: 2, name: "Ricardo Mendes", role: "Fundador da Aura E-commerce", content: "A transparência foi o diferencial. Sabíamos exatamente para onde o investimento ia e o retorno veio em 3 meses.", image: "RM" },
        { id: 3, name: "Carla Ferreira", role: "Diretora de Marketing Grupo Prime", content: "Finalmente encontramos parceiros que se importam com os nossos lucros tanto quanto nós. Confiança total.", image: "CF" }
      ];

      const services = [
        { title: "Tráfego Pago", description: "Gestão agressiva de campanhas no Google, Meta e TikTok Ads focada exclusivamente em ROI e escala.", icon: <Icon path={icons.Target} className="w-8 h-8 text-[#00F0FF]" />, features: ["Google Ads", "Meta Ads", "TikTok Ads", "Retargeting"] },
        { title: "Desenvolvimento Web", description: "Criação de Landing Pages, Sites Institucionais e E-commerces otimizados para alta conversão e velocidade.", icon: <Icon path={icons.Monitor} className="w-8 h-8 text-[#00F0FF]" />, features: ["Landing Pages", "E-commerce", "Institucionais", "Otimização UX/UI"] },
        { title: "Branding e Rebranding", description: "Construção de identidades visuais memoráveis e reformulação de marcas que precisam de um posicionamento premium.", icon: <Icon path={icons.Sparkles} className="w-8 h-8 text-[#00F0FF]" />, features: ["Identidade Visual", "Naming", "Manual da Marca", "Design System"] },
        { title: "Posicionamento de Marca", description: "Estratégia de comunicação e percepção de valor para tornar a sua empresa a autoridade máxima do seu nicho.", icon: <Icon path={icons.TrendingUp} className="w-8 h-8 text-[#00F0FF]" />, features: ["Tom de Voz", "Estratégia de Conteúdo", "Diferenciação", "Arquétipos"] },
        { title: "SEO", description: "Colocamos o seu negócio no topo das pesquisas do Google de forma orgânica, gerando tráfego qualificado gratuito.", icon: <Icon path={icons.Search} className="w-8 h-8 text-[#00F0FF]" />, features: ["SEO On-page", "SEO Local (GMN)", "Link Building", "Auditoria Técnica"] },
        { title: "Social Media", description: "Transformamos as suas redes sociais num canal ativo de vendas, comunidade e construção de autoridade.", icon: <Icon path={icons.Layers} className="w-8 h-8 text-[#00F0FF]" />, features: ["Gestão de Conteúdo", "Copywriting", "Design de Posts", "Análise de Métricas"] },
        { title: "Captação e Edição de Vídeo", description: "Produção audiovisual estratégica desenhada para reter a atenção e escalar a conversão dos seus anúncios e conteúdos.", icon: <Icon path={icons.Video} className="w-8 h-8 text-[#00F0FF]" />, features: ["Criativos para Ads", "Vídeos Institucionais", "Reels e Shorts", "Edição Dinâmica"] }
      ];

      const cases = [
        { company: "Indústria Global Tech", metric: "ROI 15.8x", description: "Reestruturação de funil B2B com foco em leads qualificados.", sub: "Crescimento sustentável e previsível." },
        { company: "E-commerce Premium", metric: "+410% Escala", description: "Escalabilidade mantendo a essência da marca e rentabilidade.", sub: "Aumento real de faturamento." }
      ];

      const partners = [
        { name: "Google Partner", icon: <Icon path={icons.Award} size={16} /> },
        { name: "Meta Partner", icon: <Icon path={icons.ShieldCheck} size={16} /> },
        { name: "RD Station", icon: <Icon path={icons.Zap} size={16} /> },
        { name: "Shopify Experts", icon: <Icon path={icons.ArrowUpRight} size={16} /> }
      ];

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (chatEndRef.current && isChatOpen) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, isTyping, isChatOpen]);

      const handleFormSubmit = (e) => {
        e.preventDefault();
        setFormSubmitted(true);
        setTimeout(() => setFormSubmitted(false), 5000);
        e.target.reset();
      };

      const handleChatSubmit = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isTyping) return;
        const userMessage = chatInput;
        setChatMessages(prev => [...prev, { role: 'user', text: userMessage }]);
        setChatInput('');
        setIsTyping(true);

        try {
          const response = await fetch('https://momesso-digital-j56waanwb-babi-camis-projects.vercel.app/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userMessage })
          });

          if (!response.ok) throw new Error('Erro na comunicação');
          
          const data = await response.json();
          setChatMessages(prev => [...prev, { role: 'assistant', text: data.text }]);
        } catch (err) {
          setChatMessages(prev => [...prev, { role: 'assistant', text: "Lamento, o sistema está temporariamente instável. Por favor, utilize o formulário abaixo." }]);
        } finally {
          setIsTyping(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#121212] text-[#EAEAEA] font-sans selection:bg-[#00F0FF] selection:text-[#121212] scroll-smooth">
          
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#121212]/95 backdrop-blur-md border-b border-[#EAEAEA]/5 py-3 shadow-lg' : 'bg-transparent py-5'}`}>
            <div className="container mx-auto px-6 flex justify-between items-center">
              <div className="flex items-center gap-2 group cursor-pointer">
                <div className="w-9 h-9 bg-[#00F0FF] rounded-lg flex items-center justify-center transition-transform group-hover:scale-105">
                  <span className="text-[#121212] font-black text-xl italic">M</span>
                </div>
                <span className="text-xl font-black tracking-tighter uppercase text-white">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
              </div>

              <div className="hidden lg:flex items-center gap-10">
                <a href="sobre.html" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors outline-none">Sobre Nós</a>
                <a href="#proposito" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Propósito</a>
                <a href="#servicos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Serviços</a>
                <a href="#depoimentos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Clientes</a>
                <a href="#contato" className="bg-[#00F0FF] text-[#121212] px-8 py-2.5 rounded-full text-xs font-black uppercase tracking-tighter hover:bg-white transition-all shadow-[0_0_15px_rgba(0,240,255,0.3)]">
                  Falar com Especialista
                </a>
              </div>

              <button className="lg:hidden text-[#EAEAEA]" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                <Icon path={isMenuOpen ? icons.X : icons.Menu} size={30} />
              </button>
            </div>

            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-[#121212] border-b border-[#212121] p-8 flex flex-col gap-6 shadow-xl">
                <a href="sobre.html" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-white">Sobre Nós</a>
                <a href="#proposito" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Propósito</a>
                <a href="#servicos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Serviços</a>
                <a href="#depoimentos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Clientes</a>
                <a href="#contato" onClick={() => setIsMenuOpen(false)} className="bg-[#00F0FF] text-[#121212] p-4 rounded-xl text-center font-black uppercase">Começar Agora</a>
              </div>
            )}
          </nav>

          <section className="relative pt-48 pb-32 overflow-hidden px-6">
            <div className="absolute top-40 left-0 w-[400px] h-[400px] bg-[#00F0FF]/10 blur-[120px] rounded-full -ml-32"></div>
            <div className="container mx-auto max-w-5xl relative z-10">
              <div className="flex items-center gap-2 mb-6">
                 <span className="text-[#EAEAEA]/50 text-xs font-black uppercase tracking-[0.3em] bg-[#212121] px-4 py-1.5 rounded-full border border-[#EAEAEA]/5">
                    <Icon path={icons.Heart} size={14} className="text-[#00F0FF] inline mr-2" /> Parceria & Resultados
                 </span>
              </div>
              <h1 className="text-5xl md:text-8xl font-black mb-8 leading-[1.1] tracking-tighter text-white uppercase">
                Estratégia digital <br />
                com <span className="text-[#00F0FF] italic underline decoration-[#00F0FF]/30">propósito real.</span>
              </h1>
              <p className="text-lg md:text-xl text-[#EAEAEA]/70 mb-12 max-w-2xl leading-relaxed">
                Não somos uma agência de métricas de vaidade. Somos o parceiro que entende o seu fluxo de caixa e escala o seu lucro.
              </p>
              <a href="#contato" className="bg-[#00F0FF] text-[#121212] px-12 py-5 rounded-full font-black text-lg inline-flex items-center gap-3 hover:scale-105 transition-transform shadow-[0_0_30px_rgba(0,240,255,0.2)] uppercase">
                Solicitar Diagnóstico <Icon path={icons.ChevronRight} size={24} />
              </a>
            </div>
          </section>

          <div className="bg-[#1A1D24] py-8 border-y border-[#EAEAEA]/5">
            <div className="container mx-auto px-6">
              <div className="flex flex-wrap justify-center md:justify-between items-center gap-8 opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
                {partners.map((p, i) => (
                  <div key={i} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]">
                    <span className="text-[#00F0FF]">{p.icon}</span> {p.name}
                  </div>
                ))}
              </div>
            </div>
          </div>

          <section id="proposito" className="py-20 bg-[#121212] border-b border-[#EAEAEA]/5">
             <div className="container mx-auto px-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                   {cases.map((c, i) => (
                      <div key={i} className="bg-[#1A1D24] p-10 rounded-[2rem] border border-[#00F0FF]/10 shadow-2xl relative overflow-hidden">
                         <Icon path={icons.TrendingUp} className="absolute -top-4 -right-4 text-[#00F0FF] opacity-5" size={120} />
                         <span className="text-[#00F0FF] font-black uppercase text-xs tracking-widest block mb-4">{c.company}</span>
                         <div className="text-6xl font-black text-white mb-4">{c.metric}</div>
                         <p className="text-[#EAEAEA]/60 font-bold uppercase tracking-tighter">{c.sub}</p>
                      </div>
                   ))}
                </div>
             </div>
          </section>

          <section id="servicos" className="py-32 bg-[#121212]">
             <div className="container mx-auto px-6">
                <h2 className="text-4xl font-black text-white mb-20 uppercase tracking-tighter">Nosso Ecossistema de <span className="text-[#00F0FF]">Crescimento</span></h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                   {services.map((s, i) => (
                      <div key={i} className="bg-[#1A1D24] p-10 rounded-[2rem] border border-[#EAEAEA]/5 hover:border-[#00F0FF]/30 transition-all group">
                         <div className="mb-6">{s.icon}</div>
                         <h3 className="text-xl font-bold mb-4 text-white">{s.title}</h3>
                         <p className="text-[#EAEAEA]/40 text-sm leading-relaxed mb-6">{s.description}</p>
                         <ul className="space-y-2">
                            {s.features.map((f, fi) => (
                               <li key={fi} className="flex items-center gap-2 text-xs font-bold text-[#EAEAEA]/60">
                                  <Icon path={icons.CheckCircle} size={14} className="text-[#00F0FF]" /> {f}
                               </li>
                            ))}
                         </ul>
                      </div>
                   ))}
                </div>
             </div>
          </section>

          <section id="depoimentos" className="py-32 bg-[#1A1D24] border-y border-[#EAEAEA]/5">
            <div className="container mx-auto px-6 text-center">
              <h2 className="text-4xl font-black mb-4 tracking-tight text-white uppercase">Vozes que confiam em nós</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-20">
                {testimonials.map((t) => (
                  <div key={t.id} className="bg-[#121212] p-10 rounded-[2rem] border border-[#EAEAEA]/5 relative group text-left flex flex-col justify-between shadow-lg">
                    <div>
                      <Icon path={icons.Quote} className="text-[#00F0FF]/20 absolute top-8 right-8" size={40} />
                      <p className="text-[#EAEAEA]/80 italic mb-10 relative z-10 leading-relaxed">"{t.content}"</p>
                    </div>
                    <div className="flex items-center gap-4 pt-6 border-t border-[#EAEAEA]/5">
                      <div className="w-12 h-12 bg-[#212121] rounded-full flex items-center justify-center font-black text-white">{t.image}</div>
                      <div>
                        <h5 className="font-bold text-white">{t.name}</h5>
                        <p className="text-[10px] text-[#00F0FF] uppercase tracking-widest font-bold">{t.role}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section id="contato" className="py-32 bg-[#121212]">
             <div className="container mx-auto max-w-4xl px-6">
                <div className="bg-[#1A1D24] p-12 rounded-[3rem] border border-[#EAEAEA]/5 shadow-2xl">
                   {!formSubmitted ? (
                      <form onSubmit={handleFormSubmit} className="space-y-8">
                         <h2 className="text-3xl font-black text-white uppercase tracking-tighter">Inicie o Diagnóstico</h2>
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input required name="name" placeholder="Nome Completo" className="w-full bg-[#1A1D24] border border-[#EAEAEA]/10 p-4 rounded-xl outline-none focus:border-[#00F0FF] text-white" />
                            <input required name="whatsapp" placeholder="WhatsApp" className="w-full bg-[#1A1D24] border border-[#EAEAEA]/10 p-4 rounded-xl outline-none focus:border-[#00F0FF] text-white" />
                            <input required name="company" placeholder="Sua Empresa" className="w-full bg-[#1A1D24] border border-[#EAEAEA]/10 p-4 rounded-xl outline-none focus:border-[#00F0FF] text-white" />
                            <select required name="interest" className="w-full bg-[#1A1D24] border border-[#EAEAEA]/10 p-4 rounded-xl outline-none focus:border-[#00F0FF] text-white appearance-none">
                               <option value="">Serviço Principal...</option>
                               <option value="Tráfego">Tráfego Pago</option>
                               <option value="Web">Desenvolvimento Web</option>
                               <option value="Branding">Branding</option>
                            </select>
                         </div>
                         <button className="w-full bg-[#00F0FF] text-[#121212] py-5 rounded-2xl font-black text-xl uppercase hover:bg-white transition-all shadow-xl">Enviar Dados para Análise</button>
                      </form>
                   ) : (
                      <div className="text-center py-10">
                         <Icon path={icons.CheckCircle} size={64} className="text-[#00F0FF] mx-auto mb-6" />
                         <h3 className="text-3xl font-black text-white">Dados Recebidos!</h3>
                      </div>
                   )}
                </div>
             </div>
          </section>

          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
            {isChatOpen && (
              <div className="mb-4 w-[350px] md:w-[400px] h-[550px] bg-[#1A1D24] border border-[#EAEAEA]/10 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
                <div className="bg-[#121212] p-6 flex items-center justify-between border-b border-[#EAEAEA]/5">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-[#00F0FF] rounded-full flex items-center justify-center text-[#121212] shadow-[0_0_10px_#00F0FF]"><Icon path={icons.Bot} size={20} /></div>
                    <span className="font-black text-sm text-white tracking-widest uppercase text-xs">Consultor Virtual</span>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} className="text-[#EAEAEA]/30 hover:text-white"><Icon path={icons.X} size={20} /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide bg-[#121212]">
                  {chatMessages.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-4 text-sm leading-relaxed shadow-lg ${msg.role === 'user' ? 'bg-[#00F0FF] text-[#121212] font-bold rounded-2xl rounded-tr-sm' : 'bg-[#1A1D24] text-[#EAEAEA]/90 border border-[#EAEAEA]/5 rounded-2xl rounded-tl-sm'}`}>
                        {msg.text}
                      </div>
                    </div>
                  ))}
                  {isTyping && <div className="text-[10px] font-black text-[#00F0FF] uppercase tracking-[0.3em] flex items-center gap-2 ml-2"><Icon path={icons.Loader2} className="animate-spin" size={14} /> Analisando Estratégia...</div>}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleChatSubmit} className="p-4 bg-[#1A1D24] border-t border-[#EAEAEA]/5">
                  <div className="relative">
                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Diga-nos o seu objetivo..." className="w-full bg-[#121212] border border-[#EAEAEA]/10 focus:border-[#00F0FF] rounded-2xl pl-5 pr-14 py-4 text-sm outline-none text-white transition-all shadow-inner" />
                    <button type="submit" disabled={isTyping || !chatInput.trim()} className="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-[#00F0FF] text-[#121212] rounded-xl flex items-center justify-center disabled:opacity-30 hover:scale-105 transition-transform"><Icon path={icons.SendHorizontal} size={20} /></button>
                  </div>
                </form>
              </div>
            )}
            <button onClick={() => setIsChatOpen(!isChatOpen)} className={`w-16 h-16 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 ${isChatOpen ? 'bg-[#1A1D24] text-[#00F0FF] border border-[#EAEAEA]/10' : 'bg-[#00F0FF] text-[#121212]'}`}>
              {isChatOpen ? <Icon path={icons.X} size={28} /> : <Icon path={icons.MessageSquare} size={28} />}
            </button>
          </div>

          <footer className="bg-[#1A1D24] border-t border-[#EAEAEA]/5 pt-20 pb-10 mt-10">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                <div className="space-y-6">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-[#00F0FF] rounded-lg flex items-center justify-center">
                      <span className="text-[#121212] font-black text-lg italic">M</span>
                    </div>
                    <span className="text-lg font-black tracking-tighter uppercase text-white">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
                  </div>
                  <p className="text-[#EAEAEA]/60 text-sm leading-relaxed">
                    Estratégia digital com propósito e performance. Transformamos cliques em clientes e investimento em lucro estruturado para o seu negócio.
                  </p>
                </div>

                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Navegação</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="index.html" className="hover:text-[#00F0FF] transition-colors">Página Inicial</a></li>
                    <li><a href="sobre.html" className="hover:text-[#00F0FF] transition-colors">Sobre Nós</a></li>
                    <li><a href="index.html#servicos" className="hover:text-[#00F0FF] transition-colors">Serviços e Soluções</a></li>
                    <li><a href="index.html#depoimentos" className="hover:text-[#00F0FF] transition-colors">Casos de Sucesso</a></li>
                  </ul>
                </div>

                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Legal & Contactos</h4>
                  <ul className="space-y-3 text-sm font-medium text-[#EAEAEA]/60">
                    <li><a href="privacidade.html" className="text-white transition-colors cursor-default">Políticas de Privacidade</a></li>
                    <li className="pt-4 flex items-center gap-3">
                      <Icon path={icons.Mail} size={16} className="text-[#00F0FF]" /> 
                      <a href="mailto:contato@momessodigital.com.br" className="hover:text-white transition-colors">contato@momessodigital.com.br</a>
                    </li>
                  </ul>
                </div>

                <div>
                  <h4 className="text-white font-black uppercase tracking-widest text-xs mb-6">Redes Sociais</h4>
                  <div className="flex gap-4">
                     <a href="#" aria-label="Instagram" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Instagram} size={18} />
                     </a>
                     <a href="#" aria-label="LinkedIn" className="w-10 h-10 rounded-full bg-[#121212] flex items-center justify-center text-[#EAEAEA]/60 hover:bg-[#00F0FF] hover:text-[#121212] hover:scale-110 transition-all border border-[#EAEAEA]/5 shadow-lg">
                       <Icon path={icons.Linkedin} size={18} />
                     </a>
                  </div>
                </div>
              </div>

              <div className="border-t border-[#EAEAEA]/5 pt-8 flex flex-col md:flex-row items-center justify-between gap-4 text-center md:text-left">
                <p className="text-[10px] font-bold text-[#EAEAEA]/40 tracking-[0.2em] uppercase">
                  &copy; {new Date().getFullYear()} Momesso Digital. Todos os direitos reservados.
                </p>
                <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#EAEAEA]/30">
                  Growth & Performance
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
