<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre Nós - Momesso Digital</title>
  
  <!-- Carrega o Tailwind CSS diretamente -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Carrega o React e o ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Carrega o Babel para traduzir JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#121212]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Utilitário para renderizar Ícones SVG limpos sem dependências externas
    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      Rocket: '<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
      ChevronRight: '<path d="m9 18 6-6-6-6"/>',
      Instagram: '<rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>',
      Linkedin: '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>',
      Globe: '<circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>',
      Target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
      ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-3 5.98-5.35.47-.55 1.17-.55 1.64 0C14.5 2.15 16.5 4 18.5 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
      Menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
      X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
    };

    const App = () => {
      const [scrolled, setScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const MAIN_SITE_URL = "index.html"; 

      return (
        <div className="min-h-screen bg-[#121212] text-[#EAEAEA] font-sans selection:bg-[#00F0FF] selection:text-[#121212] scroll-smooth">
          {/* Navbar Completa */}
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#121212]/95 backdrop-blur-md border-b border-[#EAEAEA]/5 py-3 shadow-lg' : 'bg-transparent py-5'}`}>
            <div className="container mx-auto px-6 flex justify-between items-center">
              <a href={MAIN_SITE_URL} className="flex items-center gap-2 group cursor-pointer outline-none">
                <div className="w-9 h-9 bg-[#00F0FF] rounded-lg flex items-center justify-center transition-transform group-hover:scale-105">
                  <span className="text-[#121212] font-black text-xl italic">M</span>
                </div>
                <span className="text-xl font-black tracking-tighter uppercase">MOMESSO<span className="text-[#00F0FF]">DIGITAL</span></span>
              </a>

              {/* Links Desktop apontando para index.html + âncora */}
              <div className="hidden lg:flex items-center gap-10">
                <a href="#" className="text-xs font-bold uppercase tracking-widest text-white transition-colors outline-none">Sobre Nós</a>
                <a href="index.html#proposito" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Propósito</a>
                <a href="index.html#servicos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Serviços</a>
                <a href="index.html#depoimentos" className="text-xs font-bold uppercase tracking-widest text-[#EAEAEA]/70 hover:text-white transition-colors">Clientes</a>
                <a href="index.html#contato" className="bg-[#00F0FF] text-[#121212] px-8 py-2.5 rounded-full text-xs font-black uppercase tracking-tighter hover:bg-white transition-all shadow-[0_0_15px_rgba(0,240,255,0.3)]">
                  Falar com Especialista
                </a>
              </div>

              <button className="lg:hidden text-[#EAEAEA]" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                <Icon path={isMenuOpen ? icons.X : icons.Menu} size={30} />
              </button>
            </div>

            {/* Menu Mobile apontando para index.html + âncora */}
            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-[#121212] border-b border-[#212121] p-8 flex flex-col gap-6 shadow-xl">
                <a href="#" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-left outline-none text-white">Sobre Nós</a>
                <a href="index.html#proposito" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Propósito</a>
                <a href="index.html#servicos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Serviços</a>
                <a href="index.html#depoimentos" onClick={() => setIsMenuOpen(false)} className="text-lg font-bold text-[#EAEAEA]">Clientes</a>
                <a href="index.html#contato" onClick={() => setIsMenuOpen(false)} className="bg-[#00F0FF] text-[#121212] p-4 rounded-xl text-center font-black">Começar Agora</a>
              </div>
            )}
          </nav>

          {/* Hero Section */}
          <section className="relative pt-40 pb-20 overflow-hidden">
            <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-[#00F0FF]/5 blur-[120px] rounded-full -mr-32 -mt-32"></div>
            <div className="container mx-auto px-6 relative z-10 text-center">
              <span className="text-[#00F0FF] text-xs font-black uppercase tracking-[0.3em] block mb-6">A Nossa História</span>
              <h1 className="text-4xl md:text-6xl font-black mb-8 leading-[1.1] tracking-tighter text-white max-w-4xl mx-auto">
                Nascidos no Brasil, <br />
                <span className="text-[#00F0FF] italic underline decoration-[#00F0FF]/30">focados em performance absoluta.</span>
              </h1>
            </div>
          </section>

          {/* Content Section */}
          <section className="py-12 pb-32">
            <div className="container mx-auto px-6 max-w-5xl">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
                <div className="space-y-8">
                  <p className="text-[#EAEAEA]/80 text-lg leading-relaxed">
                    A Momesso Digital entrou no mercado em 2023 com um único propósito: <strong className="text-white">acabar com o amadorismo no marketing digital</strong>. Desde o primeiro dia, a nossa cultura é guiada por dados empíricos, transparência radical e escala agressiva de lucro para os nossos parceiros.
                  </p>
                  <p className="text-[#EAEAEA]/80 text-lg leading-relaxed">
                    Não vendemos apenas tráfego ou sites esteticamente agradáveis. Entregamos um ecossistema completo de vendas que transforma visitantes casuais em clientes fiéis. O seu negócio não precisa de mais uma agência a enviar relatórios de métricas de vaidade; precisa de um parceiro estratégico que entenda o seu fluxo de caixa.
                  </p>
                  
                  <div className="flex flex-wrap items-center gap-6 pt-4 border-t border-[#EAEAEA]/10">
                    <div className="flex items-center gap-3">
                        <div className="w-12 h-12 rounded-full bg-[#1A1D24] flex items-center justify-center text-[#00F0FF] font-black border border-[#EAEAEA]/5">2023</div>
                        <span className="text-xs uppercase font-bold tracking-widest text-[#EAEAEA]/50">Ano de Fundação</span>
                    </div>
                    <div className="hidden sm:block w-px h-10 bg-[#EAEAEA]/10"></div>
                    <div className="flex items-center gap-3">
                        <div className="w-12 h-12 rounded-full bg-[#1A1D24] flex items-center justify-center text-[#00F0FF] border border-[#EAEAEA]/5"><Icon path={icons.Globe} size={20} /></div>
                        <span className="text-xs uppercase font-bold tracking-widest text-[#EAEAEA]/50">Sede no Brasil</span>
                    </div>
                  </div>
                </div>

                <div className="space-y-8">
                  <div className="bg-[#1A1D24] p-10 rounded-[2rem] border border-[#EAEAEA]/5 shadow-2xl relative overflow-hidden group hover:border-[#00F0FF]/30 transition-colors">
                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity"><Icon path={icons.Target} size={100} /></div>
                    <Icon path={icons.Rocket} className="text-[#00F0FF] w-10 h-10 mb-6" />
                    <h3 className="text-2xl font-black text-white mb-4 uppercase tracking-tighter">A Nossa Missão</h3>
                    <p className="text-[#EAEAEA]/60 leading-relaxed text-sm">
                      Elevar o padrão do mercado digital brasileiro, entregando o que realmente importa: ROI positivo, previsibilidade de caixa e posicionamento dominante para as empresas que confiam no nosso trabalho.
                    </p>
                  </div>

                  <div className="bg-[#121212] p-10 rounded-[2rem] border border-[#EAEAEA]/5 shadow-inner">
                    <Icon path={icons.ShieldCheck} className="text-[#00F0FF] w-10 h-10 mb-6" />
                    <h3 className="text-2xl font-black text-white mb-4 uppercase tracking-tighter">Os Nossos Valores</h3>
                    <ul className="space-y-4">
                      <li className="flex items-start gap-3 text-sm text-[#EAEAEA]/70">
                        <span className="text-[#00F0FF] font-black mt-0.5">&bull;</span>
                        <strong>Sinergia:</strong> O seu negócio é tratado como nosso.
                      </li>
                      <li className="flex items-start gap-3 text-sm text-[#EAEAEA]/70">
                        <span className="text-[#00F0FF] font-black mt-0.5">&bull;</span>
                        <strong>Transparência:</strong> A verdade acima de promessas irrealistas.
                      </li>
                      <li className="flex items-start gap-3 text-sm text-[#EAEAEA]/70">
                        <span className="text-[#00F0FF] font-black mt-0.5">&bull;</span>
                        <strong>Performance:</strong> Decisões baseadas em análise de dados (Data-Driven).
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              
              <div className="mt-20 text-center">
                 <a href={`${MAIN_SITE_URL}#contato`} className="inline-flex bg-[#00F0FF] text-[#121212] px-10 py-5 rounded-full font-black text-lg items-center justify-center gap-3 hover:scale-105 transition-transform shadow-[0_0_30px_rgba(0,240,255,0.2)] uppercase tracking-tighter">
                    Faça parte desta história <Icon path={icons.ChevronRight} size={24} />
                 </a>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="py-12 bg-[#1A1D24] border-t border-[#EAEAEA]/5 mt-10">
            <div className="container mx-auto px-6 text-center">
              <div className="flex items-center justify-center gap-3 mb-6">
                <span className="text-sm font-black tracking-[0.4em] uppercase text-[#EAEAEA]/30">MOMESSO DIGITAL</span>
              </div>
              <div className="flex justify-center gap-4 mb-6">
                 <a href="#" className="text-[#EAEAEA]/30 hover:text-[#00F0FF] transition-colors"><Icon path={icons.Instagram} size={18} /></a>
                 <a href="#" className="text-[#EAEAEA]/30 hover:text-[#00F0FF] transition-colors"><Icon path={icons.Linkedin} size={18} /></a>
              </div>
              <p className="text-[9px] font-bold text-[#EAEAEA]/20 tracking-[0.2em] uppercase">2026 &bull; Growth & Performance</p>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
